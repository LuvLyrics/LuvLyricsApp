name: Bug Report
description: Report a reproducible bug in LuvLyrics
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please share enough detail so contributors can reproduce and fix quickly.
  - type: input
    id: summary
    attributes:
      label: Short summary
      description: One-line description of the bug
      placeholder: Lyrics freeze when switching tracks rapidly
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact step-by-step actions
      placeholder: |
        1. Open Now Playing
        2. Start song A
        3. Tap Next 4 times quickly
        4. Observe freeze
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: App should continue rendering current lyrics smoothly
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: UI freezes for 2-3 seconds and lyrics stop scrolling
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (crash/data loss/security)
        - High (major feature broken)
        - Medium (workaround exists)
        - Low (minor UX issue)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / screen recording
      description: Paste logs or attach media if available
      placeholder: Console logs, stack traces, screenshots
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device + OS + app version/commit
      placeholder: Android 14, Pixel 7, main@abc123
    validations:
      required: true
